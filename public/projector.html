<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promidia Web - Projetor</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: rgba(255, 255, 255, 0.55);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 6vh 7vw;
      text-align: center;
    }

    .title {
      font-size: clamp(20px, 3vw, 52px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: .2px;
      color: var(--muted);
      max-width: 100%;
      word-break: break-word;
    }

    .lyrics {
      font-size: clamp(34px, 6.1vw, 112px);
      font-weight: 700;
      line-height: 1.18;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 100%;
      margin: 0;
      text-shadow: 0 2px 18px rgba(0,0,0,0.35);
    }

    .hint {
      position: fixed;
      right: 14px;
      bottom: 12px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="screen">
    <div id="title" class="title"></div>
    <pre id="lyrics" class="lyrics"></pre>
  </main>
  <div class="hint">Promidia Web • Projetor • v1.0.0</div>

  <script>
    'use strict';

    const titleEl = document.getElementById('title');
    const lyricsEl = document.getElementById('lyrics');

    function requestFullscreenSafe() {
      const root = document.documentElement;
      if (!root || typeof root.requestFullscreen !== 'function') return;
      if (document.fullscreenElement) return;
      root.requestFullscreen().catch(() => {});
    }

    function applySlide(payload = {}) {
      const title = String(payload.title || '').trim();
      const lines = Array.isArray(payload.lines)
        ? payload.lines.map(line => String(line || '').trim()).filter(Boolean)
        : [];

      titleEl.textContent = title;
      lyricsEl.textContent = lines.join('\n');
    }

    function clearSlide() {
      titleEl.textContent = '';
      lyricsEl.textContent = '';
    }

    window.addEventListener('message', event => {
      const data = event && event.data && typeof event.data === 'object' ? event.data : {};
      if (data.type === 'show-slide') {
        applySlide(data);
        return;
      }
      if (data.type === 'clear') {
        clearSlide();
      }
    });

    window.addEventListener('load', () => {
      requestFullscreenSafe();
      try {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: 'projector-ready' }, '*');
        }
      } catch {}
    });

    window.addEventListener('click', requestFullscreenSafe);
    window.addEventListener('keydown', requestFullscreenSafe);
  </script>
</body>
</html>
